<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">goal-cli artifact loop</title>
  <desc id="desc">A dark technical banner showing the goal-cli heartbeat loop from producer to artifact to tik to tok.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#0A1E2A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="192" y1="120" x2="1008" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#132033" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#07111E" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.9 0 0 0 0 1 0 0 0 0.55 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A3E635"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 H 0 V 32" stroke="#94A3B8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="34" fill="url(#grid)"/>
  <path d="M74 402 C207 304 302 321 410 248 C543 158 627 126 783 175 C916 217 994 198 1117 100" stroke="url(#accent)" stroke-opacity="0.24" stroke-width="78" stroke-linecap="round"/>
  <path d="M86 418 C221 320 305 331 421 255 C552 170 638 142 787 189 C918 231 1004 211 1110 119" stroke="url(#accent)" stroke-opacity="0.95" stroke-width="3" stroke-linecap="round"/>

  <g filter="url(#glow)">
    <circle cx="225" cy="260" r="9" fill="#22D3EE"/>
    <circle cx="472" cy="260" r="9" fill="#67E8F9"/>
    <circle cx="720" cy="260" r="9" fill="#A3E635"/>
    <circle cx="968" cy="260" r="9" fill="#FACC15"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="92" fill="#E5F9FF" font-size="58" font-weight="800" letter-spacing="0">goal-cli</text>
    <text x="75" y="132" fill="#9FB3C8" font-size="20" font-weight="500" letter-spacing="0">producer -> artifact -> tik -> tok -> next heartbeat</text>

    <g transform="translate(78 180)">
      <rect width="230" height="156" rx="18" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.55"/>
      <rect x="20" y="22" width="50" height="8" rx="4" fill="#22D3EE"/>
      <text x="20" y="62" fill="#F8FAFC" font-size="25" font-weight="750" letter-spacing="0">Producer</text>
      <text x="20" y="92" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">Run the command</text>
      <text x="20" y="116" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">that rebuilds truth.</text>
      <text x="20" y="142" fill="#38BDF8" font-size="14" font-weight="700" letter-spacing="0">make all</text>
    </g>

    <g transform="translate(326 180)">
      <rect width="230" height="156" rx="18" fill="url(#panel)" stroke="#67E8F9" stroke-opacity="0.55"/>
      <rect x="20" y="22" width="50" height="8" rx="4" fill="#67E8F9"/>
      <text x="20" y="62" fill="#F8FAFC" font-size="25" font-weight="750" letter-spacing="0">Artifact</text>
      <text x="20" y="92" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">One canonical output.</text>
      <text x="20" y="116" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">PDF, report, site, model.</text>
      <text x="20" y="142" fill="#67E8F9" font-size="14" font-weight="700" letter-spacing="0">output/full_paper.pdf</text>
    </g>

    <g transform="translate(574 180)">
      <rect width="230" height="156" rx="18" fill="url(#panel)" stroke="#A3E635" stroke-opacity="0.55"/>
      <rect x="20" y="22" width="50" height="8" rx="4" fill="#A3E635"/>
      <text x="20" y="62" fill="#F8FAFC" font-size="25" font-weight="750" letter-spacing="0">Tik</text>
      <text x="20" y="92" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">Judge only the artifact.</text>
      <text x="20" y="116" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">Write the critique ledger.</text>
      <text x="20" y="142" fill="#BEF264" font-size="14" font-weight="700" letter-spacing="0">tik.md</text>
    </g>

    <g transform="translate(822 180)">
      <rect width="230" height="156" rx="18" fill="url(#panel)" stroke="#FACC15" stroke-opacity="0.58"/>
      <rect x="20" y="22" width="50" height="8" rx="4" fill="#FACC15"/>
      <text x="20" y="62" fill="#F8FAFC" font-size="25" font-weight="750" letter-spacing="0">Tok</text>
      <text x="20" y="92" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">Repair bounded sources.</text>
      <text x="20" y="116" fill="#AAB8C8" font-size="15" font-weight="500" letter-spacing="0">Never self-declare done.</text>
      <text x="20" y="142" fill="#FDE68A" font-size="14" font-weight="700" letter-spacing="0">codex /goal</text>
    </g>

    <path d="M309 258 H319" stroke="#A3E635" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M557 258 H567" stroke="#A3E635" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M805 258 H815" stroke="#A3E635" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

    <path d="M947 350 C910 445 311 445 259 350" stroke="#A3E635" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrow)"/>
    <text x="488" y="435" fill="#C7D2FE" font-size="18" font-weight="700" letter-spacing="0">next heartbeat rebuilds the artifact</text>

    <g transform="translate(76 375)">
      <rect width="284" height="46" rx="23" fill="#07111E" fill-opacity="0.72" stroke="#334155"/>
      <circle cx="28" cy="23" r="7" fill="#22C55E"/>
      <text x="48" y="29" fill="#DCE8F5" font-size="15" font-weight="650" letter-spacing="0">state lives in files, not chat</text>
    </g>

    <g transform="translate(835 74)">
      <rect width="286" height="70" rx="18" fill="#07111E" fill-opacity="0.72" stroke="#334155"/>
      <text x="22" y="31" fill="#F8FAFC" font-size="17" font-weight="750" letter-spacing="0">Only the artifact can pass.</text>
      <text x="22" y="54" fill="#9FB3C8" font-size="14" font-weight="500" letter-spacing="0">Every heartbeat is bounded and replayable.</text>
    </g>
  </g>
</svg>
