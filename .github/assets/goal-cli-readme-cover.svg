<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">goal-cli, control coding work without reading code</title>
  <desc id="desc">A product cover for goal-cli showing an artifact-first control loop for scholars, designers, hobbyists, accountants, and brokerage analysts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101114"/>
      <stop offset="55%" stop-color="#17191f"/>
      <stop offset="100%" stop-color="#242016"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8d57a"/>
      <stop offset="100%" stop-color="#d99a2b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78f0b4"/>
      <stop offset="100%" stop-color="#44c7d4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M38 566 C214 514 309 611 470 561 C615 516 644 398 828 421 C957 438 1031 521 1162 458" fill="none" stroke="#f8d57a" stroke-opacity="0.18" stroke-width="96" stroke-linecap="round"/>
  <path d="M864 46 C989 87 1061 181 1150 121" fill="none" stroke="#78f0b4" stroke-opacity="0.18" stroke-width="74" stroke-linecap="round"/>

  <g transform="translate(62 134)">
    <text x="0" y="0" fill="#fff9ec" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="72" font-weight="850" letter-spacing="-2">
      <tspan x="0" dy="0">Control coding</tspan>
      <tspan x="0" dy="82">work without</tspan>
      <tspan x="0" dy="82">reading code</tspan>
    </text>
    <text x="4" y="282" fill="#d8d0bd" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="450">
      <tspan x="4" dy="0">Define the artifact. Rebuild it. Let a critic</tspan>
      <tspan x="4" dy="38">reject weak outputs before you trust the fix.</tspan>
    </text>
  </g>

  <g transform="translate(62 498)">
    <rect x="0" y="0" width="1036" height="104" rx="26" fill="#090a0d" fill-opacity="0.56" stroke="#ffffff" stroke-opacity="0.10"/>
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
      <g transform="translate(28 24)">
        <text x="0" y="0" fill="#78f0b4" font-size="13" font-weight="750" letter-spacing="1.8">SCHOLAR</text>
        <text x="0" y="34" fill="#fff7e6" font-size="22" font-weight="780">Paper</text>
      </g>
      <g transform="translate(226 24)">
        <text x="0" y="0" fill="#78f0b4" font-size="13" font-weight="750" letter-spacing="1.8">DESIGNER</text>
        <text x="0" y="34" fill="#fff7e6" font-size="22" font-weight="780">Poster</text>
      </g>
      <g transform="translate(424 24)">
        <text x="0" y="0" fill="#78f0b4" font-size="13" font-weight="750" letter-spacing="1.8">HOBBYIST</text>
        <text x="0" y="34" fill="#fff7e6" font-size="22" font-weight="780">Small app</text>
      </g>
      <g transform="translate(642 24)">
        <text x="0" y="0" fill="#78f0b4" font-size="13" font-weight="750" letter-spacing="1.8">ACCOUNTANT</text>
        <text x="0" y="34" fill="#fff7e6" font-size="22" font-weight="780">Report</text>
      </g>
      <g transform="translate(844 24)">
        <text x="0" y="0" fill="#78f0b4" font-size="13" font-weight="750" letter-spacing="1.8">ANALYST</text>
        <text x="0" y="34" fill="#fff7e6" font-size="22" font-weight="780">Research</text>
      </g>
    </g>
  </g>

  <g transform="translate(712 82)" filter="url(#softShadow)">
    <rect x="0" y="0" width="408" height="356" rx="32" fill="#f8f4ea"/>
    <rect x="22" y="22" width="364" height="312" rx="22" fill="#111217"/>
    <image href="goal-cli-logo-generated.png" x="58" y="42" width="292" height="243" preserveAspectRatio="xMidYMid meet"/>
    <rect x="54" y="282" width="300" height="34" rx="17" fill="url(#green)" fill-opacity="0.18"/>
    <text x="204" y="305" text-anchor="middle" fill="#fff7e6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="750" letter-spacing="1.6">ARTIFACT-FIRST CONTROL LOOP</text>
  </g>

  <g transform="translate(740 458)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="0" y="0" width="86" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="43" y="27" text-anchor="middle" fill="#fff7e6" font-size="15" font-weight="760">build</text>
    <rect x="118" y="0" width="92" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="164" y="27" text-anchor="middle" fill="#fff7e6" font-size="15" font-weight="760">review</text>
    <rect x="242" y="0" width="86" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="285" y="27" text-anchor="middle" fill="#fff7e6" font-size="15" font-weight="760">repair</text>
    <path d="M88 21 H116 M212 21 H240" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
